name: Generar y Publicar Javadoc

on:
    push:
        branches:
            - [cite_start]stable  # Solo se ejecuta cuando hay cambios en la rama stable

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build-docs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout código
              uses: actions/checkout@v4

            - name: Configurar JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Generar Javadoc
              run: javadoc -d docs -sourcepath src/main/java -subpackages com.tt1.test

            - name: Subir artefacto para Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: 'docs' # La carpeta que creamos con javadoc

    deploy:
        needs: build-docs
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Desplegar en GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4